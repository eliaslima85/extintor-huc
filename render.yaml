services:
  - type: web
    name: extintor-huc
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: extintor-huc-db
          property: connectionString

databases:
  - name: extintor-huc-db
    databaseName: extintor_huc
    plan: free
